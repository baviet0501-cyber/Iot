<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đổi mật khẩu | IoT Classroom</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Bảo mật dashboard</p>
      <h1>Đổi mật khẩu quản trị</h1>
    </div>
    <nav>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('security_logs') }}">Nhật ký an toàn</a>
      <details class="account-menu">
        <summary>{{ username }}</summary>
        <div class="account-dropdown">
          <a href="{{ url_for('change_password') }}">Đổi mật khẩu</a>
          <form method="post" action="{{ url_for('logout') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit">Đăng xuất</button>
          </form>
        </div>
      </details>
    </nav>
  </header>

  <main class="dashboard narrow">
    <section class="panel">
      {% if message %}
      <div class="alert alert-success">{{ message }}</div>
      {% endif %}
      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="post" class="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label for="current_password">Mật khẩu hiện tại</label>
        <input id="current_password" name="current_password" type="password" required>

        <label for="new_password">Mật khẩu mới</label>
        <input id="new_password" name="new_password" type="password" minlength="8" required>

        <label for="confirm_password">Nhập lại mật khẩu mới</label>
        <input id="confirm_password" name="confirm_password" type="password" minlength="8" required>

        <button type="submit">Cập nhật mật khẩu</button>
      </form>
    </section>
  </main>
</body>
</html>
