<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập | IoT Classroom</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
      <div class="brand-mark">IoT</div>
      <h1>Giám sát phòng học</h1>
      <p>Đăng nhập để xem dữ liệu cảm biến và nhật ký an toàn của hệ thống.</p>

      {% if lock_message %}
      <div class="alert alert-warning">
        <strong>Tạm khóa đăng nhập</strong>
        <span>{{ lock_message }}</span>
      </div>
      {% elif error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="post" class="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label for="username">Tên đăng nhập</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="admin" required>

        <label for="password">Mật khẩu</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu" required>

        <button type="submit">Đăng nhập</button>
      </form>
    </section>
  </main>
</body>
</html>
